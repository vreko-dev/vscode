  <circle cx="6" cy="6" r="1" fill="currentColor"></circle>
  <circle cx="10" cy="6" r="1" fill="currentColor"></circle>
</symbol><symbol viewBox="0 0 16 16" id="svgfont-snapback-cap">
  <!-- Snapback cap icon - front view -->
  <!-- Crown/dome of the cap -->
  <path d="M2 10C2 6 5 3 8 3C11 3 14 6 14 10V11H2V10Z"></path>
  <!-- Brim -->
  <path d="M1.5 11H14.5C14.8 11 15 11.2 15 11.5C15 11.8 14.8 12 14.5 12H1.5C1.2 12 1 11.8 1 11.5C1 11.2 1.2 11 1.5 11Z"></path>
  <!-- Top button -->
  <circle cx="8" cy="2.5" r="0.5"></circle>
</symbol><symbol viewBox="0 0 16 16" id="svgfont-snapback-lightning">
  <!-- Lightning bolt for AI-attributed change -->
  <path fill="currentColor" d="M9.5 1L4 8h3l-1.5 7L12 8H9l.5-7z"></path>
</symbol><symbol viewBox="0 0 16 16" id="svgfont-snapback-pulse">
  <!-- Pulse/activity icon for active session -->
  <circle cx="8" cy="8" r="3" fill="currentColor"></circle>
  <circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"></circle>
</symbol><symbol viewBox="0 0 16 16" id="svgfont-snapback-risk">
  <!-- Risk indicator icon -->
  <path fill="currentColor" d="M8 1L1 14h14L8 1zm0 2.5L12.5 13h-9L8 3.5z"></path>
  <path fill="currentColor" d="M7.25 6v3.5h1.5V6h-1.5zm0 4.5V12h1.5v-1.5h-1.5z"></path>
</symbol><symbol viewBox="0 0 16 16" id="svgfont-snapback-rollback">
  <!-- Rollback/undo icon -->
  <path fill="currentColor" d="M8 3c-2.8 0-5 2.2-5 5s2.2 5 5 5c1.5 0 2.8-.6 3.8-1.7l-1.1-1.1c-.7.8-1.7 1.3-2.7 1.3-2 0-3.5-1.6-3.5-3.5S6 4.5 8 4.5c1 0 2 .5 2.7 1.3L11.8 4.7C10.8 3.6 9.5 3 8 3z"></path>
  <path fill="currentColor" d="M10.5 2v3h3l-1.5-1.5L10.5 2z"></path>
</symbol><symbol viewBox="0 0 16 16" id="svgfont-snapbackrc-icon">
  <path fill="#4285F4" d="M8 1L1 8l7 7 7-7-7-7zm0 12.5L3.5 8 8 3.5 12.5 8 8 12.5z"></path>
  <path fill="#4285F4" d="M8 5.5L5.5 8 8 10.5 10.5 8 8 5.5z"></path>
</symbol><symbol viewBox="0 0 16 16" id="svgfont-snapshot-ai">
  <!-- AI-attributed snapshot - file with lightning overlay -->
  <path fill="currentColor" d="M2 2v12h12V5l-3-3H2zm1 1h6v3h3v8H3V3z"></path>
  <path fill="currentColor" d="M9.5 6L7 9h1.5l-1 3L10 9H8.5l1-3z"></path>
</symbol><symbol viewBox="0 0 16 16" id="svgfont-snapshot-fragile">
  <!-- Fragile file snapshot - file with warning overlay -->
  <path fill="currentColor" d="M2 2v12h12V5l-3-3H2zm1 1h6v3h3v8H3V3z"></path>
  <path fill="currentColor" d="M8 7L5 12h6L8 7zm0 1.5l1.8 3H6.2L8 8.5z"></path>
  <rect x="7.5" y="10" width="1" height="1" fill="currentColor"></rect>
</symbol><symbol viewBox="0 0 16 16" id="svgfont-snapshot-standard">
