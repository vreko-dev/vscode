  <path fill="currentColor" d="M8 2C5.8 2 4 3.8 4 6c0 1.5.8 2.8 2 3.5V11h4V9.5c1.2-.7 2-2 2-3.5 0-2.2-1.8-4-4-4zm0 1c1.7 0 3 1.3 3 3 0 1-.5 1.9-1.3 2.5l-.7.5v2H7V9l-.7-.5C5.5 7.9 5 7 5 6c0-1.7 1.3-3 3-3z"></path>
  <rect x="6" y="11" width="4" height="1" fill="currentColor"></rect>
  <rect x="7" y="12.5" width="2" height="1" fill="currentColor"></rect>
