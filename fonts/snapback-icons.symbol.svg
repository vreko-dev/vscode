  <path fill="currentColor" d="M8 3c-1.7 0-3 1.3-3 3 0 1 .5 1.9 1.3 2.5l.7.5v2h2V9l.7-.5C10.5 7.9 11 7 11 6c0-1.7-1.3-3-3-3z"></path>
