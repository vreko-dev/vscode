  <path fill="currentColor" d="M8 1L1 14h14L8 1zm0 2.5L12.5 13h-9L8 3.5z"></path>
  <rect x="7.5" y="6" width="1" height="4" fill="currentColor"></rect>
  <rect x="7.5" y="10.5" width="1" height="1" fill="currentColor"></rect>
</symbol><symbol viewBox="0 0 16 16" id="svgfont-session-abandoned">
